<!DOCTYPE html>
<html>
    <head>
        <title>Encuentro Matrimonial Mundial</title>
        <style>
            body {
                font-family: Arial, Helvetica, sans-serif;
                margin: 0;
                background: #f7f8fa;
            }
            .layout {
                min-height: 100vh;
            }
            .side-menu {
                position: fixed;
                top: 0;
                left: 0;
                width: 220px;
                height: 100vh;
                background: #263238;
                color: white;
                padding: 24px 16px;
                box-sizing: border-box;
                overflow-y: auto;
            }
            .side-menu h1 {
                font-size: 18px;
                line-height: 1.3;
                margin: 0 0 24px;
            }
            .side-menu a {
                display: block;
                color: white;
                text-decoration: none;
                padding: 10px 12px;
                border-radius: 6px;
                margin-bottom: 8px;
            }
            .side-menu a.active,
            .side-menu a:hover {
                background: #455a64;
            }
            main {
                width: 100%;
                max-width: 500px;
                margin: 50px 0 50px 220px;
                padding: 0 20px;
                box-sizing: border-box;
            }
            input, button {
                width: 100%;
                padding: 10px;
                margin: 8px 0;
            }
            .success { color: green;}
            .error { color: red;}
        </style>
    </head>
    <body>
        <div class="layout">
            <nav class="side-menu">
                <h1>Encuentro Matrimonial Mundial</h1>
                <a class="active" href="/index.html">Registrar</a>
                <a href="/admin.html">Lista de registrados</a>
            </nav>
            <main>
                <h2>Registrar</h2>

                <form id="registrationForm">
                    <label for="lastName">Apellido:</label>
                    <input type="text" id="lastName" placeholder="Apellido" required />
                    <label for="hisName">Nombre de El:</label>
                    <input type="text" id="hisName" placeholder="El" required />
                    <label for="herName">Nombre de Ella:</label>
                    <input type="text" id="herName" placeholder="Ella" required />
                    <label for="hisPhone">Numero de El:</label>
                    <input type="tel" id="hisPhone" placeholder="Numero El" required />
                    <label for="herPhone">Numero de Ella:</label>
                    <input type="tel" id="herPhone" placeholder="Numero Ella" />
                    <label for="city">Ciudad:</label>
                    <input type="text" id="city" placeholder="city" />
                    <label for="readSpanish">Saben leer Espa&ntilde;ol</label>
                    <input type="checkbox" id="readSpanish" />
                    <label for="zone">Zona:</label>
                    <input type="number" id="zone" placeholder="zona" />
                    <label for="churchMarried">Casados por la Iglecia</label>
                    <input type="checkbox" id="churchMarried" />
                    <label for="years">A&ntilde;os casados:</label>
                    <input type="number" id="years" placeholder="tiempo juntos" />
                    <label for="paid">Cantidad pagada:</label>
                    <input type="number" id="paid" title="Cantidad recibida" />
                    <label for="comments">Commentarios o restringiones:</label>
                    <input type="text" id="comments" placeholder="commentarios" />
                    <button type="submit">Registrar</button>
                </form>
                <p id="message"></p>
            </main>
        </div>

        <script>
            document.getElementById("registrationForm").addEventListener("submit", async function(e) {
                e.preventDefault();

                const data = {
                    lastName: document.getElementById("lastName").value,
                    hisName: document.getElementById("hisName").value,
                    herName: document.getElementById("herName").value,
                    hisPhone: document.getElementById("hisPhone").value,
                    herPhone: document.getElementById("herPhone").value,
                    city: document.getElementById("city").value,
                    readSpanish: document.getElementById("readSpanish").checked ? "Si" : "No",
                    zone: Number(document.getElementById("zone").value || 0),
                    churchMarried: document.getElementById("churchMarried").checked ? "Si" : "No",
                    yearsMarried: Number(document.getElementById("years").value || 0),
                    paid: Number(document.getElementById("paid").value || 0),
                    comments: document.getElementById("comments").value

                };

                try{
                    const response = await fetch("/api/registrations", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify(data)
                    });

                    const message = document.getElementById("message");

                    if(response.ok)
                    {
                        message.textContent = "Registration Successful";
                        message.className = "success";
                        document.getElementById("registrationForm").reset();
                    }
                    else
                    {
                        message.textContent = "Error Submitting Form";
                        message.className = "error";
                    }
                }
                catch(error)
                {
                    document.getElementById("message").textContent = "Server Error";
                }
            });
            </script>
    </body>
</html>
